version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: rapidmart_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: rapidmart
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    container_name: rapidmart_app
    restart: unless-stopped
    ports:
      - "3002:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/rapidmart
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-run-openssl-rand-base64-32}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://rapidmart.in}
      NEXT_PUBLIC_APP_NAME: RapidMart
      NEXT_PUBLIC_APP_URL: ${NEXTAUTH_URL:-https://rapidmart.in}
    # Build, seed (idempotent), start
    command: sh -c "npm run build && npm run seed && npm start"

volumes:
  mongo_data:
    name: rapidmart_mongo_data
    external: true
